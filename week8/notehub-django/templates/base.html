{% load static %}
<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NoteHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="{% url 'note_list' %}" class="text-xl font-bold text-gray-800">NoteHub</a>
            <div class="flex items-center gap-6">
                <a href="{% url 'note_list' %}" class="text-gray-600 hover:text-gray-800">笔记</a>
                <a href="{% url 'category_list' %}" class="text-gray-600 hover:text-gray-800">分类</a>
                <a href="{% url 'note_create' %}" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">新建笔记</a>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
