{% extends "base.html" %}

{% block title %}{% if form.instance.id %}编辑笔记{% else %}新建笔记{% endif %} - NoteHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">{% if form.instance.id %}编辑笔记{% else %}新建笔记{% endif %}</h1>
    <form method="post" class="bg-white rounded-lg shadow p-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex gap-4">
            <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">保存</button>
            <a href="{% url 'note_list' %}" class="px-6 py-2 border rounded hover:bg-gray-50">取消</a>
        </div>
    </form>
</div>
{% endblock %}
