{% extends "base.html" %}

{% block title %}删除分类 - NoteHub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">确认删除</h1>
    <div class="bg-white rounded-lg shadow p-6">
        <p class="text-gray-700 mb-4">确定要删除分类「{{ category.name }}」吗？该分类下的笔记将保留但不再属于任何分类。</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-4">
                <button type="submit" class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600">删除</button>
                <a href="{% url 'category_list' %}" class="px-6 py-2 border rounded hover:bg-gray-50">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
